name: CodeQL

on:
  push:
    paths-ignore:
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/package.json'
      - '**/package-lock.json'
  pull_request:
    paths-ignore:
      - '**/*.tf'
      - '**/*.tfvars'
      - '**/package.json'
      - '**/package-lock.json'

permissions:
  contents: read
  security-events: write
  packages: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: 'javascript'
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
